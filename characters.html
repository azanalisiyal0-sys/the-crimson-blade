        <main class="content-container characters-layout">
            
            <!-- Left Side: Interactive Character Selector Rows -->
            <section class="character-menu-box">
                <h1 class="page-main-title">Dramatis Personae</h1>
                <div class="character-rows">
                    
                    <!-- Row 1: Kenji -->
                    <div class="char-row" data-name="Kenji, The Crimson Blade" data-image="assets/images/characters/kenji.jpg" 
                         data-p1="A scarred, weary Ronin carrying the crushing guilt of a broken oath. He is practical, quiet, and ruthless when pushed."
                         data-p2="Once a proud samurai, Kenji was forced into exile after his clan was destroyed from within. He now wanders the winter wastes wielding the 'Crimson Blade'—a legendary katana with a rusted guard and a dark, blood-soaked history. He fights not for glory, but to outrun the ghosts of his past.">
                        <span class="char-id">01 //</span> <span class="char-name">KENJI</span>
                    </div>

                    <!-- Row 2: Tomoe -->
                    <div class="char-row" data-name="Lady Tomoe" data-image="assets/images/characters/tomoe.jpg" 
                         data-p1="A fiercely intelligent and observant physician's daughter. Guarded and resilient, she refuses to be a victim."
                         data-p2="After Lord Kurada’s forces slaughtered her family and destroyed her village, Tomoe fled with nothing but her medical kit. She crossed paths with a wounded Kenji in the snow. Bound by a mutual need for survival and unspoken emotional tension, she now travels with him, acting as his conscience.">
                        <span class="char-id">02 //</span> <span class="char-name">TOMOE</span>
                    </div>

                    <!-- Row 3: Kurada -->
                    <div class="char-row" data-name="Lord Kurada" data-image="assets/images/characters/lord-kurada.jpg" 
                         data-p1="A cold, calculating magistrate who rules the province with an iron fist and bureaucratic cruelty."
                         data-p2="Kurada is a tyrant who views human lives as simple tallies on a ledger. He seeks absolute control over the region and is obsessed with reclaiming the Crimson Blade—a symbol of ultimate martial authority. He doesn't chase his enemies himself; he sends waves of highly trained hunters to do it.">
                        <span class="char-id">03 //</span> <span class="char-name">LORD KURADA</span>
                    </div>

                    <!-- Row 4: Kazuma -->
                    <div class="char-row" data-name="Commander Kazuma" data-image="assets/images/characters/traitor.jpg" 
                         data-p1="A ruthless commander of Kurada’s personal guard and Kenji’s former brother-in-arms."
                         data-p2="Kazuma once stood shoulder-to-shoulder with Kenji under the same master. However, when the war turned, Kazuma traded his honor and his brothers' lives for wealth and status under Lord Kurada. He knows Kenji’s fighting style perfectly, making him the most dangerous man on Kenji’s trail.">
                        <span class="char-id">04 //</span> <span class="char-name">KAZUMA</span>
                    </div>

                </div>
            </section>

            <!-- Right Side Hidden Panel (Slides out dynamically on click) -->
